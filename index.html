<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXW3 Local Site</title>
    <link rel="stylesheet" href="Kernel/styles.css">
</head>
<body>
    <div id="app"></div>

    <!-- Kernel Scripts -->
    <script src="Kernel/core.js"></script>
    <script src="Kernel/utils.js"></script>
    <script src="Kernel/modManager.js"></script>

    <!-- Initialize Site -->
    <script>
        (async () => {
            // Create kernel instance
            const kernel = new EXW3Kernel();
            const modManager = new EXW3ModManager(kernel);

            // Load configuration with auto-discovery of new mods
            const config = await fetch('/api/mods')
                .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
                .catch(() => fetch('Config/site-config.json').then(r => r.json()));

            // Load and register all mods
            await modManager.loadAllMods(config);

            // Init sections
            await kernel.init(config);

            // Apply permission layers BEFORE render so section filtering works
            const PRE_RENDER_LAYERS = ['login', 'permissions'];
            if (config.layers) {
                for (const layerName of config.layers) {
                    if (PRE_RENDER_LAYERS.includes(layerName)) {
                        kernel.applyLayer(layerName);
                    }
                }
            }

            // Render sections (permissions already set, so filtering applies)
            await kernel.render('app');

            // Apply remaining layers after render so DOM injections work
            if (config.layers) {
                for (const layerName of config.layers) {
                    if (!PRE_RENDER_LAYERS.includes(layerName)) {
                        kernel.applyLayer(layerName);
                    }
                }
            }

            // Expose kernel to console for debugging
            window.__exw3_kernel = kernel;
            window.__exw3_modManager = modManager;

            console.log('✓ EXW3 Site initialized successfully');
            console.log('Use window.__exw3_kernel for debugging');
        })();
    </script>
</body>
</html>
